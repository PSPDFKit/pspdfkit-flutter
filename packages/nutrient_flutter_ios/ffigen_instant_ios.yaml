# ============================================================================
# Nutrient Instant iOS SDK FFI Bindings Configuration
# ============================================================================
#
# Generates Dart FFI bindings for the Instant (real-time collaboration) framework.
# Generated separately from the main PSPDFKit bindings to avoid OOM during generation.
#
# Usage: dart run ffigen --config ffigen_instant_ios.yaml
#
# Requirements:
# - Instant 26.5.0 must be cached via CocoaPods
# - Run: cd example/ios && pod install (if not already done)
#
name: NutrientInstantIOSBindings
description: "FFI bindings for Nutrient Instant iOS SDK (26.5.0)"
language: objc
output: "lib/src/bindings/nutrient_instant_ios_bindings.dart"

# Native assets hook provides the dylib containing the protocol trampolines
ffi-native:
  asset-id: 'package:nutrient_flutter_ios/nutrient_flutter_ios.dylib'

headers:
  entry-points:
    # Instant umbrella header (real-time collaboration)
    - "example/ios/Pods/Instant/Instant.xcframework/ios-arm64_x86_64-simulator/Instant.framework/Headers/Instant.h"
    # PSPDFKit needed for superclass types (PSPDFViewController, PSPDFDocument, etc.)
    - "example/ios/Pods/PSPDFKit/PSPDFKit.xcframework/ios-arm64_x86_64-simulator/PSPDFKit.framework/Headers/PSPDFKit.h"
    - "example/ios/Pods/PSPDFKit/PSPDFKitUI.xcframework/ios-arm64_x86_64-simulator/PSPDFKitUI.framework/Headers/PSPDFKitUI.h"

compiler-opts:
  - "-target"
  - "arm64-apple-ios16.0-simulator"
  - "-Fexample/ios/Pods/Instant/Instant.xcframework/ios-arm64_x86_64-simulator"
  - "-Fexample/ios/Pods/PSPDFKit/PSPDFKit.xcframework/ios-arm64_x86_64-simulator"
  - "-Fexample/ios/Pods/PSPDFKit/PSPDFKitUI.xcframework/ios-arm64_x86_64-simulator"
  - "-Iexample/ios/Pods/Instant/Instant.xcframework/ios-arm64_x86_64-simulator/Instant.framework/Headers"
  - "-Iexample/ios/Pods/PSPDFKit/PSPDFKit.xcframework/ios-arm64_x86_64-simulator/PSPDFKit.framework/Headers"
  - "-Iexample/ios/Pods/PSPDFKit/PSPDFKitUI.xcframework/ios-arm64_x86_64-simulator/PSPDFKitUI.framework/Headers"

# Only generate Instant classes â€” exclude everything else to keep output small
objc-interfaces:
  include:
    - "PSPDFInstant.*"
  member-rename:
    '.*':
      '^([^:]+):([^:]+):$': '$1_$2'
      '^([^:]+):([^:]+):([^:]+):$': '$1_$2_$3'
      '^([^:]+):([^:]+):([^:]+):([^:]+):$': '$1_$2_$3_$4'
      '^([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):$': '$1_$2_$3_$4_$5'
      '^([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):$': '$1_$2_$3_$4_$5_$6'
      '^([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):$': '$1_$2_$3_$4_$5_$6_$7'
      '^([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):$':
        '$1_$2_$3_$4_$5_$6_$7_$8'

objc-protocols:
  include:
    - "PSPDFInstant.*"
  member-rename:
    '.*':
      '^([^:]+):([^:]+):$': '$1_$2'
      '^([^:]+):([^:]+):([^:]+):$': '$1_$2_$3'
      '^([^:]+):([^:]+):([^:]+):([^:]+):$': '$1_$2_$3_$4'
      '^([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):$': '$1_$2_$3_$4_$5'

enums:
  include:
    - "PSPDFInstant.*"

functions:
  include:
    - "PSPDFInstant.*"

globals:
  exclude:
    - "_xpc_.*"
    - "kDNSService.*"
    - "_dispatch_.*"
    - "__dispatch_.*"

sort: true

preamble: |
  // AUTO-GENERATED FILE. DO NOT EDIT.
  //
  // Generated by FFIgen for Nutrient Instant iOS SDK (26.5.0).
  // Provides Dart FFI bindings for the Nutrient Instant collaboration SDK.
  //
  // To regenerate:
  //   1. Ensure Instant 26.5.0 is cached: cd example/ios && pod install
  //   2. Run: dart run ffigen --config ffigen_instant_ios.yaml
  //
  // Nutrient Instant Documentation: https://www.nutrient.io/guides/ios/instant/

  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
  // ignore_for_file: unnecessary_non_null_assertion
  // ignore_for_file: unused_element
  // ignore_for_file: unused_field
  // ignore_for_file: return_of_invalid_type
  // ignore_for_file: void_checks
  // ignore_for_file: annotate_overrides
  // ignore_for_file: no_leading_underscores_for_local_identifiers
  // ignore_for_file: library_private_types_in_public_api
  // ignore_for_file: constant_identifier_names
  // coverage:ignore-file
