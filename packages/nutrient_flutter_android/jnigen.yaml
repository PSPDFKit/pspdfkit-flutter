# Exclude classes with known jnigen bugs
# Note: These classes are generated but have issues that are fixed by scripts/fix_bindings.sh
exclude:
  classes:
    # These exclusions don't work properly, so we generate and fix in post-processing
    # - LongTermValidationExceptionKt: method name conflicts with return type
    # - Response classes: generic parent fromReference parameter issues

# Classpath Configuration
# These paths must be configured before generating bindings.
# See generate_bindings.sh for automatic setup, or set manually:
#
# 1. Build the example app to generate plugin classes:
#    cd ../nutrient_flutter/example/android && ./gradlew assembleDebug
#
# 2. Extract AndroidX JARs to /tmp/:
#    cp ~/.gradle/caches/.../fragment-*.aar /tmp/ && unzip -q /tmp/fragment-*.aar classes.jar -d /tmp/fragment
#    cp ~/.gradle/caches/.../appcompat-*.aar /tmp/ && unzip -q /tmp/appcompat-*.aar classes.jar -d /tmp/appcompat
#
# 3. Set ANDROID_HOME or use default Android SDK location
#
class_path:
  # NOTE: This file is a template. Run ./generate_bindings.sh which will:
  # 1. Auto-detect Nutrient SDK JARs from your Gradle cache
  # 2. Auto-detect ANDROID_HOME from common locations
  # 3. Create a temporary config with actual paths
  # 4. Run jnigen with the resolved paths
  #
  # Do not edit the paths below - they are placeholders replaced by the script
  - 'NUTRIENT_API_JAR_PLACEHOLDER'
  - 'NUTRIENT_RUNTIME_JAR_PLACEHOLDER'

  # Android platform package classes (compiled)
  - 'ANDROID_PLATFORM_CLASSES_PLACEHOLDER'

  # nutrient_flutter classes (for PSPDFKitView adapter bridge access)
  - 'NUTRIENT_FLUTTER_JAR_PLACEHOLDER'

  # Android SDK platform JAR
  - 'ANDROID_HOME_PLACEHOLDER/platforms/android-35/android.jar'

preamble: |
  // AUTO-GENERATED FILE. DO NOT EDIT.
  //
  // Generated by JNIgen for comprehensive Nutrient Android SDK bindings.
  // This file provides Dart bindings for the entire Nutrient Android SDK v10.8.0.
  //
  // Nutrient SDK Documentation: https://www.nutrient.io/guides/android/
  // JNI Package: package:jni/jni.dart

log_level: info
